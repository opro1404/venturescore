<style>

body { background: #0a0a0f; color: #f0f0f0; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

.plan-badge { display: inline-block; background: rgba(184,255,87,0.1); border: 1px solid rgba(184,255,87,0.3); border-radius: 100px; padding: 6px 18px; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #b8ff57; margin-bottom: 28px; }
